<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEaT X 26 – Timetable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── LEAT BRAND COLORS (from logo) ───────────────────────── */
:root {
  --leat-blue:    #0066cc;
  --leat-indigo:  #5533bb;
  --leat-magenta: #c0006e;
  --leat-orange:  #e07020;
  --leat-dark:    #1e2d3d;
  --leat-grad: linear-gradient(135deg, #0066cc 0%, #7722aa 40%, #c0006e 70%, #e07020 100%);

  /* Stage colors mapped to logo gradient stops */
  --stage-main:      #1e2d3d;
  --stage-community: #0066cc;
  --stage-pixel:     #c0006e;
  --stage-specials:  #e07020;
  --stage-all:       #7722aa;
}

/* ── LIGHT THEME ─────────────────────────────────────────── */
[data-theme="light"] {
  --bg:           #f0f2f5;
  --bg2:          #ffffff;
  --surface:      #ffffff;
  --surface2:     #f0f2f5;
  --surface3:     #e4e7ec;
  --border:       rgba(30,45,61,0.10);
  --border2:      rgba(30,45,61,0.06);
  --text:         #1e2d3d;
  --text2:        #3a4d60;
  --muted:        #7a8fa0;
  --header-bg:    rgba(240,242,245,0.88);
  --card-shadow:  0 1px 4px rgba(30,45,61,0.08), 0 1px 2px rgba(30,45,61,0.04);
}
/* ── DARK THEME ──────────────────────────────────────────── */
[data-theme="dark"] {
  --bg:           #0e1820;
  --bg2:          #1a2635;
  --surface:      #1a2635;
  --surface2:     #243347;
  --surface3:     #2e4058;
  --border:       rgba(255,255,255,0.08);
  --border2:      rgba(255,255,255,0.04);
  --text:         #eef2f6;
  --text2:        #c8d4de;
  --muted:        #6e8aa0;
  --header-bg:    rgba(14,24,32,0.90);
  --card-shadow:  0 1px 4px rgba(0,0,0,0.35);
  --stage-main:   #8ab0d0;
}

/* ── RESET ───────────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:15px; line-height:1.4; min-height:100vh; overflow-x:hidden;
  transition:background .3s,color .3s;
}

/* ── LAYOUT WRAPPER (desktop) ────────────────────────────── */
.app-shell {
  display: flex; flex-direction: column; min-height: 100vh;
}
@media (min-width: 900px) {
  .app-shell { flex-direction: row; align-items: flex-start; }
}

/* ── SIDEBAR (desktop) ───────────────────────────────────── */
.sidebar {
  display: none;
}
@media (min-width: 900px) {
  .sidebar {
    display: flex; flex-direction: column;
    width: 240px; flex-shrink: 0;
    position: sticky; top: 0; height: 100vh;
    background: var(--leat-dark);
    padding: 28px 0 20px;
    z-index: 50;
  }
  .sidebar-logo {
    padding: 0 24px 28px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .sidebar-logo-text {
    font-weight: 700; font-size: 1.4rem; letter-spacing: -0.02em; color: #fff;
  }
  .sidebar-logo-x { background: var(--leat-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .sidebar-logo-year { font-weight: 300; font-size: 0.75rem; color: rgba(255,255,255,0.45); margin-top: 2px; letter-spacing: 0.05em; }

  .sidebar-clock {
    padding: 14px 24px 0;
    font-size: 0.75rem; color: rgba(255,255,255,0.4);
    display: flex; align-items: center; gap: 6px;
  }
  .sidebar-live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #30d158; animation: blink 2s infinite; flex-shrink: 0;
  }

  .sidebar-section { padding: 20px 16px 8px; font-size: 0.63rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

  .sidebar-day-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 9px 16px 9px 20px;
    background: none; border: none; cursor: pointer;
    font-family: inherit; font-size: 0.85rem; font-weight: 500;
    color: rgba(255,255,255,0.55); text-align: left;
    border-radius: 0; transition: background .15s, color .15s;
    position: relative;
  }
  .sidebar-day-btn::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 0; border-radius: 0 2px 2px 0;
    background: var(--leat-grad); transition: height .2s;
  }
  .sidebar-day-btn.active { color: #fff; background: rgba(255,255,255,0.07); }
  .sidebar-day-btn.active::before { height: 70%; }
  .sidebar-day-btn:hover:not(.active) { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.04); }

  .sidebar-date { font-size: 0.7rem; color: rgba(255,255,255,0.3); margin-top: 1px; font-weight: 400; }
  .sidebar-fav-badge {
    margin-left: auto; background: var(--leat-magenta); color: #fff;
    border-radius: 8px; font-size: 0.62rem; font-weight: 700; padding: 1px 6px;
  }

  .sidebar-section-stage { padding: 20px 16px 8px; font-size: 0.63rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

  .sidebar-stage-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 8px 16px 8px 20px;
    background: none; border: none; cursor: pointer;
    font-family: inherit; font-size: 0.82rem; font-weight: 500;
    color: rgba(255,255,255,0.5); text-align: left;
    transition: background .15s, color .15s;
  }
  .sidebar-stage-btn.active { color: #fff; background: rgba(255,255,255,0.07); }
  .sidebar-stage-btn:hover:not(.active) { color: rgba(255,255,255,0.75); }
  .sidebar-stage-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .sidebar-stage-dot[data-stage="all"]       { background: var(--leat-grad); background-size: 80px; }
  .sidebar-stage-dot[data-stage="main"]      { background: var(--stage-main); }
  .sidebar-stage-dot[data-stage="community"] { background: var(--stage-community); }
  .sidebar-stage-dot[data-stage="pixel"]     { background: var(--stage-pixel); }
  .sidebar-stage-dot[data-stage="specials"]  { background: var(--stage-specials); }

  .sidebar-bottom {
    margin-top: auto; padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
  }
  .dm-toggle-sidebar {
    background: rgba(255,255,255,0.08); border: none; cursor: pointer;
    padding: 6px 12px; border-radius: 8px; font-size: 0.78rem; color: rgba(255,255,255,0.7);
    transition: background .15s; display: flex; align-items: center; gap: 6px;
  }
  .dm-toggle-sidebar:hover { background: rgba(255,255,255,0.14); }
}

/* ── MAIN AREA ───────────────────────────────────────────── */
.main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* ── MOBILE HEADER ───────────────────────────────────────── */
.mobile-header {
  position: sticky; top: 0; z-index: 200;
  background: var(--header-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border);
  padding: 0 16px;
}
@media (min-width: 900px) { .mobile-header { display: none; } }

.mobile-header-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0 10px;
}
.mobile-logo { display: flex; align-items: baseline; gap: 3px; }
.mobile-logo-text { font-weight: 700; font-size: 1.15rem; letter-spacing: -0.02em; color: var(--text); }
.mobile-logo-x {
  font-weight: 700; font-size: 1.15rem; letter-spacing: -0.02em;
  background: var(--leat-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.mobile-logo-year { font-size: 0.7rem; color: var(--muted); margin-left: 2px; }
.mobile-header-right { display: flex; align-items: center; gap: 8px; }
.live-clock { font-size: 0.75rem; font-weight: 500; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #30d158; animation: blink 2s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.dm-toggle {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface2); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; color: var(--text); transition: background .2s;
}
.dm-toggle:active { transform: scale(.92); }

/* mobile tabs */
.mobile-tabs { display: flex; overflow-x: auto; scrollbar-width: none; padding-bottom: 1px; }
.mobile-tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 9px 14px 8px;
  font-size: 0.8rem; font-weight: 600;
  cursor: pointer; border: none; background: transparent;
  color: var(--muted); border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s; white-space: nowrap;
}
.tab.active { color: var(--leat-blue); border-bottom-color: var(--leat-blue); }
.fav-badge {
  display: inline-block; background: var(--leat-magenta); color: #fff;
  border-radius: 8px; font-size: 0.6rem; font-weight: 700;
  padding: 1px 5px; margin-left: 3px; vertical-align: middle;
}

/* ── DESKTOP PAGE HEADER ──────────────────────────────────── */
.page-header {
  display: none;
  padding: 32px 32px 0;
  align-items: flex-start; justify-content: space-between;
}
@media (min-width: 900px) {
  .page-header { display: flex; }
}
.page-title {
  font-size: 1.6rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text);
}
.page-subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }
.page-live-clock {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.78rem; color: var(--muted); font-weight: 500;
  background: var(--surface); border: 0.5px solid var(--border);
  padding: 6px 12px; border-radius: 20px;
}
.page-live-dot { width: 6px; height: 6px; border-radius: 50%; background: #30d158; animation: blink 2s infinite; }

/* ── MOBILE STAGE NAV ─────────────────────────────────────── */
.stage-nav {
  background: var(--header-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border);
  padding: 8px 16px 10px;
}
@media (min-width: 900px) { .stage-nav { display: none; } }

.stage-nav-inner { display: flex; align-items: center; gap: 10px; }
.stage-arrow {
  flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface2); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; font-weight: 600; color: var(--text2);
  transition: background .15s, opacity .15s;
}
.stage-arrow:disabled { opacity: .25; cursor: default; }
.stage-arrow:not(:disabled):active { background: var(--surface3); }

.stage-label-area { flex: 1; text-align: center; }
.stage-label-name { font-size: 0.85rem; font-weight: 600; color: var(--text); display: block; }
.stage-label-hint { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }

.stage-dots { display: flex; justify-content: center; gap: 5px; margin-top: 7px; }
.stage-dot {
  width: 6px; height: 6px; border-radius: 50%; opacity: .25;
  transition: opacity .2s, transform .2s; cursor: pointer;
}
.stage-dot.active { opacity: 1; transform: scale(1.35); }
.stage-dot[data-stage="all"]       { background: var(--leat-indigo); }
.stage-dot[data-stage="main"]      { background: var(--stage-main); }
.stage-dot[data-stage="community"] { background: var(--stage-community); }
.stage-dot[data-stage="pixel"]     { background: var(--stage-pixel); }
.stage-dot[data-stage="specials"]  { background: var(--stage-specials); }

/* ── CONTENT ──────────────────────────────────────────────── */
.content { flex: 1; padding-bottom: 80px; }
@media (min-width: 900px) { .content { padding-bottom: 40px; } }

.day-view { display: none; }
.day-view.active { display: block; }
#fav-view { display: none; }
#fav-view.active { display: block; }

/* ── DESKTOP CONTENT LAYOUT ───────────────────────────────── */
.desktop-content {
  padding: 20px 32px 0;
}
@media (max-width: 899px) { .desktop-content { padding: 0; } }

/* ── BANNERS ──────────────────────────────────────────────── */
.banner-area { padding: 0 16px; }
@media (min-width: 900px) { .banner-area { padding: 0; } }

.now-banner {
  margin: 10px 0 0; padding: 10px 14px;
  background: linear-gradient(135deg, rgba(0,102,204,0.12), rgba(192,0,110,0.10));
  border: 1px solid rgba(0,102,204,0.25);
  border-radius: 12px; font-size: 0.78rem; font-weight: 500; color: var(--leat-blue);
  display: none; align-items: flex-start; gap: 8px;
}
[data-theme="dark"] .now-banner { color: #60aaff; border-color: rgba(0,102,204,0.35); background: rgba(0,102,204,0.12); }
.now-banner.visible { display: flex; }
.now-banner strong { font-weight: 700; }

.conflict-banner {
  margin: 6px 0 0; padding: 10px 14px;
  background: rgba(192,0,110,0.06); border: 1px solid rgba(192,0,110,0.25);
  border-radius: 12px; font-size: 0.78rem; color: var(--leat-magenta);
  display: none; align-items: flex-start; gap: 9px; font-weight: 500; line-height: 1.45;
}
.conflict-banner.visible { display: flex; }
.conflict-banner strong { font-weight: 700; }

/* ── SWIPE PANELS ─────────────────────────────────────────── */
.stage-panels-wrapper { overflow: hidden; touch-action: pan-y; }
.stage-panels { display: flex; transition: transform .3s cubic-bezier(.4,0,.2,1); will-change: transform; }
.stage-panel { flex-shrink: 0; width: 100%; padding: 0 16px 8px; }
@media (min-width: 900px) {
  .stage-panels { display: block !important; transform: none !important; }
  .stage-panel { width: auto; padding: 0; }
}

/* ── TIME LABELS ──────────────────────────────────────────── */
.time-label {
  font-size: 0.67rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); padding: 18px 0 6px;
  border-top: 0.5px solid var(--border); margin-top: 4px;
}
.time-label:first-child { border-top: none; padding-top: 14px; }

/* ── SESSION CARDS ────────────────────────────────────────── */
.session-card {
  background: var(--surface); border-radius: 14px;
  margin-bottom: 8px; overflow: hidden;
  box-shadow: var(--card-shadow); border: 0.5px solid var(--border2);
  transition: box-shadow .2s, transform .15s, background .3s;
  position: relative;
}
.session-card:active { transform: scale(.99); }
@media (min-width: 900px) {
  .session-card:hover { box-shadow: 0 4px 16px rgba(30,45,61,0.12); transform: translateY(-1px); }
  [data-theme="dark"] .session-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
}

/* gradient left bar */
.stage-main      .session-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:14px 0 0 14px; background: var(--stage-main); }
.stage-community .session-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:14px 0 0 14px; background: var(--stage-community); }
.stage-pixel     .session-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:14px 0 0 14px; background: var(--stage-pixel); }
.stage-specials  .session-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:14px 0 0 14px; background: var(--stage-specials); }

.session-card.now-playing { box-shadow: 0 0 0 1.5px var(--leat-blue), var(--card-shadow); }
.session-card.favorited.conflict { box-shadow: 0 0 0 1.5px var(--leat-magenta), var(--card-shadow); }

.card-header { display:flex; align-items:flex-start; padding:12px 12px 12px 15px; gap:10px; cursor:pointer; user-select:none; }
.card-main { flex:1; min-width:0; }
.card-meta { display:flex; align-items:center; gap:6px; margin-bottom:4px; flex-wrap:wrap; }
.card-time { font-size:0.7rem; font-weight:600; color:var(--muted); white-space:nowrap; font-variant-numeric:tabular-nums; }
.card-stage-pill {
  font-size:0.62rem; font-weight:600; padding:2px 8px; border-radius:100px; white-space:nowrap;
}
.stage-main      .card-stage-pill { background:rgba(30,45,61,0.08);   color:var(--stage-main); }
.stage-community .card-stage-pill { background:rgba(0,102,204,0.10);  color:var(--stage-community); }
.stage-pixel     .card-stage-pill { background:rgba(192,0,110,0.10);  color:var(--stage-pixel); }
.stage-specials  .card-stage-pill { background:rgba(224,112,32,0.12); color:var(--stage-specials); }
[data-theme="dark"] .stage-main .card-stage-pill { background:rgba(138,176,208,0.15); }

.now-tag { font-size:0.6rem; font-weight:700; background:var(--leat-blue); color:#fff; padding:2px 8px; border-radius:100px; animation:blink 2s infinite; }
.card-title { font-size:0.88rem; font-weight:600; line-height:1.35; color:var(--text); letter-spacing:-0.01em; }
.card-actions { display:flex; align-items:center; gap:5px; flex-shrink:0; padding-top:1px; }
.conflict-tag { font-size:.9rem; cursor:default; }
.fav-btn { background:none; border:none; cursor:pointer; font-size:1rem; padding:3px; line-height:1; color:var(--border); transition:color .15s,transform .15s; }
.fav-btn.active { color:var(--leat-magenta); }
.fav-btn:active { transform:scale(1.3); }
.expand-btn {
  background:none; border:none; cursor:pointer;
  width:22px; height:22px; border-radius:50%; background:var(--surface2);
  color:var(--muted); font-size:.65rem;
  display:flex; align-items:center; justify-content:center;
  transition:transform .2s, background .15s; flex-shrink:0;
}
.session-card.expanded .expand-btn { transform:rotate(180deg); }

/* ── CARD DETAILS ─────────────────────────────────────────── */
.card-details { display:none; padding:0 14px 13px 15px; border-top:0.5px solid var(--border); }
.session-card.expanded .card-details { display:block; }
.card-speaker { font-size:.77rem; color:var(--muted); padding-top:9px; line-height:1.55; }
.card-speaker strong { color:var(--text2); font-weight:600; }
.card-link {
  display:inline-flex; align-items:center; gap:4px;
  margin-top:10px; font-size:.75rem; font-weight:600;
  color:var(--leat-blue); text-decoration:none; transition:opacity .15s;
}
.card-link:hover { opacity:.75; }

/* ── DESKTOP GRID VIEW ────────────────────────────────────── */
@media (min-width: 900px) {
  .stage-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    align-items: start;
    margin-top: 4px;
  }
  .stage-grid-col { }
  .stage-col-header {
    display: flex; align-items: center; gap: 8px;
    padding: 0 0 12px;
    border-bottom: 2px solid;
    margin-bottom: 4px;
  }
  .stage-col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .stage-col-name { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.02em; }

  .stage-col-header[data-stage="main"]      { border-color: var(--stage-main); }
  .stage-col-header[data-stage="community"] { border-color: var(--stage-community); }
  .stage-col-header[data-stage="pixel"]     { border-color: var(--stage-pixel); }
  .stage-col-header[data-stage="specials"]  { border-color: var(--stage-specials); }

  .stage-col-header[data-stage="main"]      .stage-col-dot  { background: var(--stage-main); }
  .stage-col-header[data-stage="community"] .stage-col-dot  { background: var(--stage-community); }
  .stage-col-header[data-stage="pixel"]     .stage-col-dot  { background: var(--stage-pixel); }
  .stage-col-header[data-stage="specials"]  .stage-col-dot  { background: var(--stage-specials); }

  .stage-col-header[data-stage="main"]      .stage-col-name { color: var(--stage-main); }
  .stage-col-header[data-stage="community"] .stage-col-name { color: var(--stage-community); }
  .stage-col-header[data-stage="pixel"]     .stage-col-name { color: var(--stage-pixel); }
  .stage-col-header[data-stage="specials"]  .stage-col-name { color: var(--stage-specials); }

  /* In grid mode, cards have no left bar padding issue */
  .stage-grid .session-card { margin-bottom: 6px; }
  .stage-grid .time-label { padding-top: 14px; }
  .stage-grid .time-label:first-child { padding-top: 6px; }
}

/* ── FAVORITES ────────────────────────────────────────────── */
.fav-view-inner { padding: 0 16px; }
@media (min-width: 900px) { .fav-view-inner { padding: 0 32px; } }
.fav-empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:.85rem; line-height:1.7; }
.fav-empty .icon { font-size:2.5rem; margin-bottom:10px; display:block; }
.day-header { font-size:.7rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); padding:18px 0 8px; }

/* ── FOOTER ───────────────────────────────────────────────── */
.footer-note {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--header-bg); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:0.5px solid var(--border); padding:8px 16px 10px;
  font-size:.65rem; color:var(--muted); text-align:center;
  z-index: 100;
}

// ── DARK MODE ──────────────────────────────────────────────────────────
function applyDark(){
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  const icon=darkMode?'☀️':'🌙';
  ['dm-icon','dm-icon-sidebar'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=icon;});
  const lbl=document.getElementById('dm-label');
  if(lbl) lbl.textContent=darkMode?'Light Mode':'Dark Mode';
}
function toggleDark(){darkMode=!darkMode;localStorage.setItem('leat-dark',darkMode);applyDark();}
applyDark();

// ── TIME ───────────────────────────────────────────────────────────────
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function overlaps(a,b){return toMin(a.start)<toMin(b.end)&&toMin(b.start)<toMin(a.end);}
function isNowPlaying(s,dk){
  const now=new Date(),d=PROGRAM[dk]?.date;if(!d)return false;
  const[y,mo,dy]=d.split('-').map(Number);
  if(now.getFullYear()!==y||now.getMonth()+1!==mo||now.getDate()!==dy)return false;
  const nm=now.getHours()*60+now.getMinutes();
  return nm>=toMin(s.start)&&nm<toMin(s.end);
}
function getConflicts(){
  const c=new Set();
  ['pre','wed','thu'].forEach(dk=>{
    const f=PROGRAM[dk].sessions.filter(s=>favorites.includes(s.id));
    f.forEach((a,i)=>f.forEach((b,j)=>{if(i!==j&&overlaps(a,b)){c.add(a.id);c.add(b.id);}}));
  });
  return c;
}

// ── RENDER CARD ────────────────────────────────────────────────────────
function renderCard(s,dk,cs){
  const isFav=favorites.includes(s.id),isNow=isNowPlaying(s,dk),isConflict=isFav&&cs.has(s.id);
  return `<div class="session-wrap stage-${s.stage}">
  <div class="session-card${isNow?' now-playing':''}${isFav?' favorited':''}${isConflict?' conflict':''}" id="card-${s.id}">
    <div class="card-header" onclick="toggleCard('${s.id}')">
      <div class="card-main">
        <div class="card-meta">
          <span class="card-time">${s.start}–${s.end}</span>
          <span class="card-stage-pill">${STAGE_LABELS[s.stage]}</span>
          ${isNow?'<span class="now-tag">LÄUFT</span>':''}
        </div>
        <div class="card-title">${s.title}</div>
      </div>
      <div class="card-actions">
        ${isConflict?'<span class="conflict-tag" title="Zeitkonflikt">⚡</span>':''}
        <button class="fav-btn${isFav?' active':''}" onclick="toggleFav(event,'${s.id}')" title="Favorit">♥</button>
        <button class="expand-btn">▾</button>
      </div>
    </div>
    <div class="card-details">
      <div class="card-speaker"><strong>Speaker:</strong><br>${s.speaker}</div>
      <a class="card-link" href="${s.url}" target="_blank">Details auf leatcon.com →</a>
    </div>
  </div>
</div>`;
}

  if(!sessions.length) return `<div style="padding:20px 0;color:var(--muted);font-size:0.82rem;text-align:center;">Keine Sessions.</div>`;
  const groups={};
  sessions.forEach(s=>{(groups[s.start]=groups[s.start]||[]).push(s);});
  return Object.keys(groups).sort().map(t=>
    `<div class="time-label">${t} Uhr</div>`+groups[t].map(s=>renderCard(s,dk,cs)).join('')
  ).join('');
}

// ── DESKTOP GRID ───────────────────────────────────────────────────────
function renderDesktopGrid(dk){
  const stages=['main','community','pixel','specials'];
  const cs=getConflicts();
  return stages.map(stage=>{
    let sessions=PROGRAM[dk].sessions.filter(s=>s.stage===stage);
    const groups={};
    sessions.forEach(s=>{(groups[s.start]=groups[s.start]||[]).push(s);});
    const cards=Object.keys(groups).sort().map(t=>
      `<div class="time-label">${t} Uhr</div>`+groups[t].map(s=>renderCard(s,dk,cs)).join('')
    ).join('');
    return `<div class="stage-grid-col">
      <div class="stage-col-header" data-stage="${stage}">
        <span class="stage-col-dot"></span>
        <span class="stage-col-name">${STAGE_LABELS[stage]}</span>
      </div>
      ${cards||'<div style="padding:12px 0;color:var(--muted);font-size:0.8rem;">Keine Sessions.</div>'}
    </div>`;
  }).join('');
}

function renderAll(){
  isDesktop=window.innerWidth>=900;
  ['pre','wed','thu'].forEach(dk=>{
    if(isDesktop){
      // show grid, hide panels
      const grid=document.getElementById('grid-'+dk);
      const wrapper=document.getElementById('swipe-'+dk);
      if(grid){grid.innerHTML=renderDesktopGrid(dk);grid.style.display='grid';}
      if(wrapper) wrapper.style.display='none';
    } else {
      const grid=document.getElementById('grid-'+dk);
      const wrapper=document.getElementById('swipe-'+dk);
      if(grid) grid.style.display='none';
      if(wrapper) wrapper.style.display='';
      STAGE_ORDER.forEach(stage=>{
        const el=document.getElementById('panel-'+dk+'-'+stage);
        if(el) el.innerHTML=sessionsByStage(dk,stage);
      });
    }
  });
  document.getElementById('list-fav').innerHTML=renderFavs();
  updateNowBanners();
  updateConflictBanners();
  updateFavCount();
  updateStageUI();
}

function renderFavs(){
  if(!favorites.length) return `<div class="fav-empty"><span class="icon">♥</span>Noch keine Favoriten.<br>Tippe auf ♥ bei einem Programmpunkt.</div>`;
  const cs=getConflicts();
  let html='';
  ['pre','wed','thu'].forEach(dk=>{
    const items=PROGRAM[dk].sessions.filter(s=>favorites.includes(s.id));
    if(!items.length)return;
    html+=`<div class="day-header">${PROGRAM[dk].label}</div>`;
    items.sort((a,b)=>a.start.localeCompare(b.start)).forEach(s=>{html+=renderCard(s,dk,cs);});
  });
  return html;
}

// ── STAGE UI ───────────────────────────────────────────────────────────
function updateStageUI(){
  const idx=STAGE_ORDER.indexOf(currentStage);
  // mobile panels
  if(!isDesktop){
    ['pre','wed','thu'].forEach(dk=>{
      const p=document.getElementById('panels-'+dk);
      if(p) p.style.transform=`translateX(-${idx*100}%)`;
    });
  }
  // dots + pills + sidebar
  document.querySelectorAll('.stage-dot').forEach(d=>d.classList.toggle('active',d.dataset.stage===currentStage));
  document.querySelectorAll('.sidebar-stage-btn').forEach(b=>b.classList.toggle('active',b.dataset.stage===currentStage));
  // label + arrows
  const ln=document.getElementById('stage-label-name');
  if(ln){ln.textContent=STAGE_LABELS[currentStage];ln.style.color=STAGE_COLORS[currentStage];}
  const prev=document.getElementById('arrow-prev'),next=document.getElementById('arrow-next');
  if(prev) prev.disabled=idx===0;
  if(next) next.disabled=idx===STAGE_ORDER.length-1;
}

function stepStage(dir){
  const idx=STAGE_ORDER.indexOf(currentStage),next=idx+dir;
  if(next>=0&&next<STAGE_ORDER.length) filterStage(STAGE_ORDER[next]);
}

// ── BANNERS ────────────────────────────────────────────────────────────
function updateNowBanners(){
  ['pre','wed','thu'].forEach(dk=>{
    const cur=PROGRAM[dk].sessions.filter(s=>isNowPlaying(s,dk));
    const el=document.getElementById('now-'+dk);
    if(!el)return;
    if(cur.length){el.innerHTML=`<span>▶</span><span><strong>Gerade:</strong> ${cur.map(s=>s.title).join(' · ')}</span>`;el.classList.add('visible');}
    else el.classList.remove('visible');
  });
  const now=new Date(),pad=n=>String(n).padStart(2,'0');
  const ts=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const tk=Object.keys(PROGRAM).find(k=>PROGRAM[k]?.date===ts);
  const fe=document.getElementById('now-fav');
  if(fe&&tk){
    const cur=PROGRAM[tk].sessions.filter(s=>isNowPlaying(s,tk)&&favorites.includes(s.id));
    if(cur.length){fe.innerHTML=`<span>▶</span><span><strong>Dein Favorit läuft:</strong> ${cur.map(s=>s.title).join(' · ')}</span>`;fe.classList.add('visible');}
    else fe.classList.remove('visible');
  }
}

function getConflictPairs(dk){
  const f=PROGRAM[dk].sessions.filter(s=>favorites.includes(s.id));
  const pairs=[],seen=new Set();
  f.forEach((a,i)=>f.forEach((b,j)=>{
    if(i<j&&overlaps(a,b)){const k=[a.id,b.id].sort().join('|');if(!seen.has(k)){seen.add(k);pairs.push([a,b]);}}
  }));
  return pairs;
}
function updateConflictBanners(){
  ['pre','wed','thu'].forEach(dk=>{
    const el=document.getElementById('conflict-'+dk),pairs=getConflictPairs(dk);
    if(!el)return;
    if(pairs.length){el.innerHTML=`<span>⚡</span><span><strong>Zeitkonflikt:</strong><br>${pairs.map(([a,b])=>`<strong>${a.title}</strong> (${a.start}) & <strong>${b.title}</strong> (${b.start})`).join('<br>')}</span>`;el.classList.add('visible');}
    else el.classList.remove('visible');
  });
  const el=document.getElementById('conflict-fav'),allP=[],seen=new Set();
  ['pre','wed','thu'].forEach(dk=>getConflictPairs(dk).forEach(p=>{const k=p.map(s=>s.id).sort().join('|');if(!seen.has(k)){seen.add(k);allP.push(p);}}));
  if(!el)return;
  if(allP.length){el.innerHTML=`<span>⚡</span><span><strong>${allP.length===1?'1 Zeitkonflikt':allP.length+' Zeitkonflikte'}:</strong><br>${allP.map(([a,b])=>`<strong>${a.title}</strong> (${a.start}) & <strong>${b.title}</strong> (${b.start})`).join('<br>')}</span>`;el.classList.add('visible');}
  else el.classList.remove('visible');
}

function updateFavCount(){
  const n=favorites.length;
  ['fav-count','fav-count-sidebar'].forEach(id=>{
    const b=document.getElementById(id);
    if(!b)return;
    if(n){b.textContent=n;b.style.display='inline-block';}else b.style.display='none';
  });
}

// ── INTERACTIONS ───────────────────────────────────────────────────────
function switchDay(day){
  currentDay=day;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.day===day));
  document.querySelectorAll('.sidebar-day-btn').forEach(b=>b.classList.toggle('active',b.dataset.day===day));
  document.querySelectorAll('.day-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('fav-view').classList.remove('active');
  const sn=document.getElementById('stage-nav');
  const ss=document.getElementById('sidebar-stage-section');
  const sbtns=document.querySelectorAll('.sidebar-stage-btn');
  if(day==='fav'){
    document.getElementById('fav-view').classList.add('active');
    if(sn) sn.style.display='none';
    if(ss) ss.style.display='none';
    sbtns.forEach(b=>b.style.display='none');
  } else {
    document.getElementById('day-'+day).classList.add('active');
    if(sn) sn.style.display='';
    if(ss) ss.style.display='';
    sbtns.forEach(b=>b.style.display='');
    initSwipe(day);
  }
  // update page title
  const pt=document.getElementById('page-title');
  if(pt) pt.textContent=DAY_TITLES[day]||'';
  renderAll();
}

function filterStage(stage){
  currentStage=stage;
  renderAll();
}

function toggleCard(id){document.getElementById('card-'+id).classList.toggle('expanded');}
function toggleFav(e,id){
  e.stopPropagation();
  favorites=favorites.includes(id)?favorites.filter(f=>f!==id):[...favorites,id];
  localStorage.setItem('leat-favs',JSON.stringify(favorites));
  renderAll();
}

// ── SWIPE ──────────────────────────────────────────────────────────────
function initSwipe(dk){
  const w=document.getElementById('swipe-'+dk);
  if(!w||w._si)return; w._si=true;
  let sx=0,sy=0,drag=false,horiz=null;
  w.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;drag=true;horiz=null;},{passive:true});
  w.addEventListener('touchmove',e=>{
    if(!drag)return;
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(horiz===null) horiz=Math.abs(dx)>Math.abs(dy);
    if(horiz) e.preventDefault();
  },{passive:false});
  w.addEventListener('touchend',e=>{
    if(!drag||!horiz){drag=false;return;}
    const dx=e.changedTouches[0].clientX-sx; drag=false;
    if(Math.abs(dx)<40)return;
    const idx=STAGE_ORDER.indexOf(currentStage);
    if(dx<0&&idx<STAGE_ORDER.length-1) filterStage(STAGE_ORDER[idx+1]);
    if(dx>0&&idx>0) filterStage(STAGE_ORDER[idx-1]);
  },{passive:true});
}

// ── CLOCK ──────────────────────────────────────────────────────────────
function updateClock(){
  const n=new Date(),t=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  ['mobile-clock','sidebar-clock','desktop-clock'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=t;});
}

// ── RESIZE ─────────────────────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{ isDesktop=window.innerWidth>=900; renderAll(); },150);
});

// ── INIT ───────────────────────────────────────────────────────────────
renderAll();
updateClock();
initSwipe('wed');
setInterval(()=>{updateClock();renderAll();},30000);

const now=new Date(),pad=n=>String(n).padStart(2,'0');
const todayStr=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
const autoDay=Object.keys(PROGRAM).find(k=>PROGRAM[k]?.date===todayStr);
if(autoDay) switchDay(autoDay); else initSwipe(currentDay);
</script>
